name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  # 回归验证四件套：fmt + clippy + build + test
  # MSRV 1.75（workspace.package.rust-version），stable + MSRV 双矩阵
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.75"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: build + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.75"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --workspace
        run: cargo build --workspace --all-targets
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets
      - name: cargo test --doc
        run: cargo test --workspace --doc
      - name: CLI 端到端
        run: |
          set -e
          NEUTRON=./target/debug/neutron
          # 空输入应能跑通整个 pipeline（frontend → optimizer → arch → isel → regalloc → backend）
          $NEUTRON /dev/null --target cuda --opt 2 --dump > /dev/null 2>&1
          # --version / --help 标志
          $NEUTRON --version | grep -q "^neutron "
          $NEUTRON -V | grep -q "^neutron "
          $NEUTRON --help 2>&1 | grep -q "用法: neutron"
          $NEUTRON -h 2>&1 | grep -q "用法: neutron"
          # -o 输出到文件
          $NEUTRON /dev/null --target cuda --opt 2 -o /tmp/out.cu > /dev/null 2>&1
          test -s /tmp/out.cu
          grep -q "neutron" /tmp/out.cu
          # 用法错误必须退出码 2
          set +e
          $NEUTRON > /dev/null 2>&1; code=$?; [ $code -eq 2 ] || { echo "no-args exit=$code (want 2)"; exit 1; }
          $NEUTRON /dev/null --target > /dev/null 2>&1; code=$?; [ $code -eq 2 ] || { echo "--target-missing exit=$code (want 2)"; exit 1; }
          $NEUTRON /dev/null --opt > /dev/null 2>&1; code=$?; [ $code -eq 2 ] || { echo "--opt-missing exit=$code (want 2)"; exit 1; }
          $NEUTRON /dev/null -o > /dev/null 2>&1; code=$?; [ $code -eq 2 ] || { echo "-o-missing exit=$code (want 2)"; exit 1; }
          $NEUTRON /dev/null --bogus > /dev/null 2>&1; code=$?; [ $code -eq 2 ] || { echo "unknown-flag exit=$code (want 2)"; exit 1; }
          set -e
          echo "CLI smoke tests passed"

  # 文档构建（doc-test + 链接检查）
  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
